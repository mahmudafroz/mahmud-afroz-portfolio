<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mahmud Afroz Portfolio</title>
  <desc id="desc">Dark portfolio card for Mahmud Afroz, GIS Technician and Geographic Data Analyst.</desc>
  <rect width="1200" height="630" fill="#08090b"/>
  <rect x="80" y="70" width="1040" height="490" rx="18" fill="#0d0e11" stroke="rgba(255,255,255,0.14)"/>
  <circle cx="182" cy="184" r="58" fill="#15171c" stroke="rgba(255,255,255,0.16)"/>
  <text x="182" y="202" text-anchor="middle" fill="#f5f5f5" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">MA</text>
  <text x="260" y="182" fill="#f5f5f5" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Mahmud Afroz</text>
  <text x="263" y="226" fill="#a2a6ae" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500">GIS Technician | Geographic Data Analyst</text>
  <text x="120" y="360" fill="#f5f5f5" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Utility GIS, spatial analysis, remote sensing, and geospatial research</text>
  <text x="120" y="414" fill="#a2a6ae" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500">Building reliable GIS workflows and practical spatial insight.</text>
  <g fill="#15171c" stroke="rgba(255,255,255,0.12)">
    <rect x="120" y="470" width="132" height="42" rx="8"/>
    <rect x="268" y="470" width="162" height="42" rx="8"/>
    <rect x="446" y="470" width="158" height="42" rx="8"/>
  </g>
  <g fill="#a2a6ae" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">
    <text x="145" y="497">ArcGIS Pro</text>
    <text x="293" y="497">Remote Sensing</text>
    <text x="471" y="497">Spatial Analysis</text>
  </g>
